<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente de Testes - Caixa Eletrônico Pro (Protegido)</title>
    <style>
        /* --- ESTILOS GERAIS (LIGHT MODE COMPACTO) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9; 
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .painel-principal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        @media (max-width: 850px) {
            .painel-principal { grid-template-columns: 1fr; }
        }

        .modulo {
            background-color: #ffffff; 
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modulo.monitor { border-top: 5px solid #10b981; }
        .modulo.cliente { border-top: 5px solid #0ea5e9; }

        h2 {
            margin: 0;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .txt-cliente { color: #0ea5e9; }
        .txt-monitor { color: #10b981; }

        .botoes-topo { display: flex; gap: 6px; }

        button {
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button.btn-sacar { background: #0ea5e9; }
        button.btn-depositar { background: #10b981; }
        button.btn-admin { background: #64748b; }
        button.btn-perigo { background: #ef4444; }
        button.btn-autenticar { background: #f59e0b; color: #ffffff; } 
        button.btn-autenticado { background: #10b981; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; transform: none; box-shadow: none; }

        /* --- SEÇÃO DE CARTÕES --- */
        .grade-cartoes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 130px;
            overflow-y: auto;
            padding: 2px;
        }

        .cartao-falso {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 0.75rem;
        }
        .cartao-falso.selecionado {
            border-color: #0ea5e9;
            box-shadow: 0 0 8px rgba(14, 165, 233, 0.3);
            transform: scale(1.02);
        }
        .cartao-saldo { font-weight: bold; margin-top: 5px; text-align: right; color: #38bdf8;}

        /* --- DASHBOARD & SPINNER --- */
        .dashboard-central {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: #f8fafc;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #f1f5f9;
        }
        .dados-dashboard { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .dash-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .dash-valor { font-size: 1.1rem; font-weight: bold; color: #1e293b; }

        .progresso-circular {
            position: relative;
            height: 70px;
            width: 70px;
            border-radius: 50%;
            background: conic-gradient(#e2e8f0 0deg, #e2e8f0 360deg); 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progresso-circular::before {
            content: ""; position: absolute; height: 54px; width: 54px; border-radius: 50%; background-color: #f8fafc;
        }
        .valor-porcentagem { position: relative; font-size: 1rem; font-weight: 700; color: #0ea5e9; }

        /* --- GRADES DE HARDWARE --- */
        .grade-cedulas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .card-cedula { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.8rem; }
        .val-cedula { color: #10b981; font-weight: bold; }

        /* --- CONTAINER DE INJEÇÃO --- */
        .painel-injecao {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: opacity 0.3s ease;
        }
        .painel-injecao.bloqueado {
            opacity: 0.4;
            pointer-events: none; 
        }
        .inputs-inline { display: flex; gap: 8px; }
        .inputs-inline input { margin-bottom: 0; }

        /* --- LOGS E OUTPUTS --- */
        .log-container {
            background-color: #1e293b; border-radius: 8px; height: 110px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.75rem;
        }
        .log-linha { margin-bottom: 4px; border-bottom: 1px dashed #334155; padding-bottom: 2px; }
        .log-saque { color: #f87171; }
        .log-deposito { color: #4ade80; }
        .log-sistema { color: #38bdf8; }
        .log-erro { color: #fbcfe8; background-color: #881337; padding: 2px 4px; border-radius: 4px; }

        input {
            width: 100%; padding: 10px; background-color: #ffffff; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; color: #1e293b; box-sizing: border-box;
        }
        input:focus { border-color: #0ea5e9; outline: none; }
        input:disabled { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; }

        #outResp p {
            background-color: #f0f9ff; color: #0369a1; padding: 10px; border-radius: 6px; margin: 4px 0; font-weight: 600; border-left: 4px solid #0ea5e9; font-size: 0.85rem; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="painel-principal">
    
    <!-- COLUNA 1: TERMINAL DO CLIENTE -->
    <div class="modulo cliente">
        <form id="frmCaixa" onsubmit="return false;">
            <h2>
                <span class="txt-cliente">Terminal do Cliente</span>
                <div class="botoes-topo">
                    <button type="button" id="btnDepositar" class="btn-depositar">Depositar</button>
                    <button type="button" id="btnSacar" class="btn-sacar">Resgatar</button>
                </div>
            </h2>
            <input type="number" id="inValor" min="2" placeholder="Digite o valor (R$)">
        </form>

        <div class="dashboard-central">
            <div class="dados-dashboard">
                <div class="dash-card">
                    <div class="dash-label">Saldo do Cartão Ativo</div>
                    <div class="dash-valor" id="monSaldo">R$ 0</div>
                </div>
                <div class="dash-card">
                    <div class="dash-label">Total Resgatado (Sessão)</div>
                    <div class="dash-valor" id="monVolume">R$ 0</div>
                </div>
            </div>
            <div class="wrapper-carregador">
                <div class="progresso-circular" id="progressoCircular">
                    <span class="valor-porcentagem" id="valorPorcentagem">0%</span>
                </div>
            </div>
        </div>

        <div>
            <div class="dash-label" style="margin-bottom: 6px;">Cartões Disponíveis para Teste</div>
            <div class="grade-cartoes" id="containerCartoes"></div>
        </div>
        <div id="outResp"></div>
    </div>

    <!-- COLUNA 2: MONITOR TÉCNICO & FUNÇÕES ADMIN PROTEGIDAS -->
    <div class="modulo monitor">
        <h2>
            <span class="txt-monitor">Monitor de Hardware</span>
            <div class="botoes-topo">
                <button type="button" id="btnAutenticar" class="btn-autenticar">🔐 Desbloquear Admin</button>
                <button type="button" id="btnSimularErro" class="btn-perigo" disabled>Injetar Travamento</button>
                <button type="button" id="btnResetarTudo" class="btn-admin" style="background-color: #334155;" disabled>Reset Fábrica</button>
            </div>
        </h2>
        
        <div class="dash-label">Inventário Acumulado de Cédulas</div>
        <div class="grade-cedulas">
            <div class="card-cedula">R$ 200: <span class="val-cedula" id="n200">0</span></div>
            <div class="card-cedula">R$ 100: <span class="val-cedula" id="n100">0</span></div>
            <div class="card-cedula">R$ 50:  <span class="val-cedula" id="n50">0</span></div>
            <div class="card-cedula">R$ 20:  <span class="val-cedula" id="n20">0</span></div>
            <div class="card-cedula">R$ 10:  <span class="val-cedula" id="n10">0</span></div>
            <div class="card-cedula">R$ 2:   <span class="val-cedula" id="n2">0</span></div>
        </div>

        <div class="painel-injecao bloqueado" id="painelInjecao">
            <div class="dash-label" style="color: #475569;">Injetar Novo Cartão no Sistema</div>
            <div class="inputs-inline">
                <input type="text" id="addNome" placeholder="Bandeira/Nome" disabled>
